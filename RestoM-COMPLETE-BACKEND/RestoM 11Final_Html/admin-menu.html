<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Management | RestoM Admin Elite</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="css/admin-menu.css" />
    <link rel="stylesheet" href="css/admin-dashboard.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
          <a href="#" class="sidebar-logo"
            ><img src="assets/admin-logo.png" alt="RestoM" />
           
        </div>
        <nav class="sidebar-nav">
          <a href="admin-dashboard.html" class="nav-link"
            ><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a
          >
          <a href="admin-orders.html" class="nav-link"
            ><i class="bi bi-receipt-cutoff"></i><span>Orders</span></a
          >
          <a href="admin-menu.html" class="nav-link active"
            ><i class="bi bi-journal-text"></i><span>Menu List</span></a
          >
          <a href="admin-analytics.html" class="nav-link"
            ><i class="bi bi-bar-chart-line"></i><span>Analytics</span></a
          >
          <a href="admin-billing.html" class="nav-link"
            ><i class="bi bi-wallet2"></i><span>Billing</span></a
          >
        </nav>
        <div class="p-4 mt-auto">
          <button
            class="btn btn-outline-light w-100 rounded-pill border-opacity-10 py-2"
            onclick="logout()"
          >
            Log Out
          </button>
        </div>
      </aside>

      <main class="admin-main">
        <header class="admin-header">
          <div class="d-flex align-items-center gap-3">
            <button
              class="btn btn-light d-lg-none rounded-circle shadow-sm"
              onclick="toggleSidebar()"
            >
              <i class="bi bi-list fs-4"></i>
            </button>
            <h4 class="mb-0">Menu Management</h4>
          </div>
          <div class="d-flex align-items-center gap-3">
            <div class="notification-wrap">
              <button
                class="btn btn-light rounded-circle shadow-sm notification-btn"
                type="button"
                id="adminNotificationBtn"
              >
                <i class="bi bi-bell-fill"></i>
                <span class="notification-badge" id="adminNotificationBadge">0</span>
              </button>
              <div class="notification-dropdown" id="adminNotificationDropdown">
                <div class="notification-title">Support Messages</div>
                <div id="adminNotificationList" class="notification-list"></div>
              </div>
            </div>
            <!-- Profile Dropdown -->
            <div class="profile-wrap">
              <button
                class="btn profile-btn d-flex align-items-center gap-2"
                type="button"
                id="adminProfileBtn"
              >
                <div class="text-end d-none d-md-block">
                  <h6 class="mb-0 fw-bold">Abishek Bangre</h6>
                  <small class="text-muted">Master Admin</small>
                </div>
                <div
                  class="bg-dark text-white rounded-circle d-flex align-items-center justify-content-center"
                  style="width: 40px; height: 40px; font-weight: 700"
                >
                  A
                </div>
              </button>
              <div class="profile-dropdown" id="adminProfileDropdown">
                <a href="admin-profile.html" class="profile-dropdown-item">
                  <i class="bi bi-person-gear"></i>
                  <span>Profile Settings</span>
                </a>
                <div class="profile-dropdown-divider"></div>
                <button class="profile-dropdown-item text-danger" onclick="logout()">
                  <i class="bi bi-box-arrow-right"></i>
                  <span>Log Out</span>
                </button>
              </div>
            </div>
          </div>
        </header>

        <div class="container-fluid" style="padding-top: 10px">
          <div class="table-container">
            <div
              class="d-flex justify-content-between align-items-center px-2"
            >
              <h5 class="mb-0">Dish Inventory</h5>
              <button
                class="btn btn-dark rounded-pill px-4 py-2 fw-bold"
                onclick="showAddMenuModal()"
              >
                <i class="bi bi-plus-lg me-2"></i> Add Dish
              </button>
            </div>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th style="min-width: 250px">Dish Name</th>
                    <th>Category</th>
                    <th>Type</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th class="text-end">Actions</th>
                  </tr>
                </thead>
                <tbody id="menuTableBody"></tbody>
              </table>
            </div>
            <div id="paginationContainer" class="mt-4"></div>
          </div>
        </div>
      </main>
    </div>

    <div class="modal fade" id="menuModal" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content shadow-lg">
          <div class="modal-header">
            <h5 class="modal-title h4" id="menuModalTitle">
              Item Configuration
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body p-4">
            <form id="menuForm">
              <input type="hidden" id="menuItemId" />
              <div class="row g-4">
                <div class="col-md-6">
                  <label class="form-label small fw-bold text-muted"
                    >DISH NAME</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="itemName"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold text-muted"
                    >CATEGORY</label
                  >
                  <select class="form-select" id="itemCategory" required>
                    <option value="1">Starters</option>
                    <option value="2">Main Course</option>
                    <option value="3">Desserts</option>
                    <option value="4">Beverages</option>
                    <option value="5">Kids</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold text-muted"
                    >CHOOSE IMAGE</label
                  >
                  <input
                    type="file"
                    class="form-control"
                    id="itemImageFile"
                    accept="image/*"
                  />
                </div>
                <div class="col-md-3">
                  <label class="form-label small fw-bold text-muted"
                    >PRICE (₹)</label
                  >
                  <input
                    type="number"
                    class="form-control"
                    id="itemPrice"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label class="form-label small fw-bold text-muted"
                    >FOOD TYPE</label
                  >
                  <select class="form-select" id="itemFoodType">
                    <option value="Veg">Veg</option>
                    <option value="Non-Veg">Non-Veg</option>
                  </select>
                </div>
                <div class="col-md-4">
                  <div class="form-check form-switch mt-2">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="itemAvailable"
                      checked
                    />
                    <label class="form-check-label small fw-bold"
                      >In Stock</label
                    >
                  </div>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer border-0 px-4 pb-4">
            <button
              type="button"
              class="btn btn-light rounded-pill px-4"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-primary rounded-pill px-4 fw-bold"
              onclick="saveMenuItem()"
            >
              Save dish
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin-menu.js"></script>
  </body>
</html>
