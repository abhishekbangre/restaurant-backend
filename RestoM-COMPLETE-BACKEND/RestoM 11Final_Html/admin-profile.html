<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Settings | RestoM Admin Elite</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet" href="css/admin-dashboard.css" />
    <link rel="stylesheet" href="css/admin-profile.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
          <a href="#" class="sidebar-logo"
            ><img src="assets/admin-logo.png" alt="RestoM"
          /></a>
        </div>
        <nav class="sidebar-nav">
          <a href="admin-dashboard.html" class="nav-link"
            ><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a
          >
          <a href="admin-orders.html" class="nav-link"
            ><i class="bi bi-receipt-cutoff"></i><span>Orders</span></a
          >
          <a href="admin-menu.html" class="nav-link"
            ><i class="bi bi-journal-text"></i><span>Menu List</span></a
          >
          <a href="admin-analytics.html" class="nav-link"
            ><i class="bi bi-bar-chart-line"></i><span>Analytics</span></a
          >
          <a href="admin-billing.html" class="nav-link"
            ><i class="bi bi-wallet2"></i><span>Billing</span></a
          >
        </nav>
        <div class="p-4 mt-auto">
          <button
            class="btn btn-outline-light w-100 rounded-pill border-opacity-10 py-2"
            onclick="logout()"
          >
            Log Out
          </button>
        </div>
      </aside>

      <main class="admin-main">
        <header class="admin-header">
          <div class="d-flex align-items-center gap-3">
            <button
              class="btn btn-light d-lg-none rounded-circle shadow-sm"
              onclick="toggleSidebar()"
            >
              <i class="bi bi-list fs-4"></i>
            </button>
            <h4 class="mb-0">Profile Settings</h4>
          </div>
          <div class="d-flex align-items-center gap-3">
            <div class="notification-wrap">
              <button
                class="btn btn-light rounded-circle shadow-sm notification-btn"
                type="button"
                id="adminNotificationBtn"
              >
                <i class="bi bi-bell-fill"></i>
                <span class="notification-badge" id="adminNotificationBadge"
                  >0</span
                >
              </button>
              <div class="notification-dropdown" id="adminNotificationDropdown">
                <div class="notification-title">Support Messages</div>
                <div id="adminNotificationList" class="notification-list"></div>
              </div>
            </div>
            <!-- Profile Dropdown -->
            <div class="profile-wrap">
              <button
                class="btn profile-btn d-flex align-items-center gap-2"
                type="button"
                id="adminProfileBtn"
              >
                <div class="text-end d-none d-md-block">
                  <h6 class="mb-0 fw-bold" id="headerAdminName">
                    Abishek Bangre
                  </h6>
                  <small class="text-muted">Master Admin</small>
                </div>
                <div
                  class="bg-dark text-white rounded-circle d-flex align-items-center justify-content-center"
                  style="width: 40px; height: 40px; font-weight: 700"
                  id="headerAdminAvatar"
                >
                  A
                </div>
              </button>
              <div class="profile-dropdown" id="adminProfileDropdown">
                <a href="admin-profile.html" class="profile-dropdown-item">
                  <i class="bi bi-person-gear"></i>
                  <span>Profile Settings</span>
                </a>
                <div class="profile-dropdown-divider"></div>
                <button
                  class="profile-dropdown-item text-danger"
                  onclick="logout()"
                >
                  <i class="bi bi-box-arrow-right"></i>
                  <span>Log Out</span>
                </button>
              </div>
            </div>
          </div>
        </header>

        <div class="content-container p-4">
          <div class="row justify-content-center">
            <div class="col-12">
              <div class="profile-settings-card">
                <div class="profile-header-section">
                  <div class="profile-avatar-large" id="profileAvatar">A</div>
                  <div class="profile-header-info">
                    <h4 class="mb-1" id="profileName">Abishek Bangre</h4>
                    <p class="text-muted mb-0" id="profileRole">Master Admin</p>
                  </div>
                </div>

                <form id="profileForm" class="profile-form">
                  <div class="form-section-title">
                    <i class="bi bi-person-badge"></i>
                    Personal Information
                  </div>

                  <div class="row g-4">
                    <div class="col-md-4">
                      <div class="form-group">
                        <label class="form-label-custom">Full Name</label>
                        <div class="input-group-custom">
                          <span class="input-icon"
                            ><i class="bi bi-person-fill"></i
                          ></span>
                          <input
                            type="text"
                            class="form-control-custom"
                            id="adminName"
                            placeholder="Enter your full name"
                            oninput="
                              this.value = this.value.replace(
                                /[^a-zA-Z\s]/g,
                                '',
                              )
                            "
                          />
                        </div>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group">
                        <label class="form-label-custom">Mobile Number</label>
                        <div class="input-group-custom">
                          <span class="input-icon"
                            ><i class="bi bi-phone-fill"></i
                          ></span>
                          <input
                            type="tel"
                            class="form-control-custom"
                            id="adminMobile"
                            placeholder="Enter mobile number"
                            maxlength="10"
                            oninput="
                              this.value = this.value
                                .replace(/[^0-9]/g, '')
                                .slice(0, 10)
                            "
                          />
                        </div>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group">
                        <label class="form-label-custom">Email Address</label>
                        <div class="input-group-custom">
                          <span class="input-icon"
                            ><i class="bi bi-envelope-fill"></i
                          ></span>
                          <input
                            type="email"
                            class="form-control-custom"
                            id="adminEmail"
                            placeholder="Enter email address"
                            readonly
                          />
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="form-section-title mt-4">
                    <i class="bi bi-shield-lock-fill"></i>
                    Change Password
                  </div>

                  <div class="row g-4">
                    <div class="col-md-4">
                      <div class="form-group">
                        <label class="form-label-custom"
                          >Current Password</label
                        >
                        <div class="input-group-custom">
                          <span class="input-icon"
                            ><i class="bi bi-key-fill"></i
                          ></span>
                          <input
                            type="password"
                            class="form-control-custom"
                            id="currentPassword"
                            placeholder="Enter current password"
                          />
                          <button
                            type="button"
                            class="btn-toggle-password"
                            onclick="togglePassword('currentPassword')"
                          >
                            <i class="bi bi-eye-fill"></i>
                          </button>
                        </div>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group">
                        <label class="form-label-custom">New Password</label>
                        <div class="input-group-custom">
                          <span class="input-icon"
                            ><i class="bi bi-lock-fill"></i
                          ></span>
                          <input
                            type="password"
                            class="form-control-custom"
                            id="newPassword"
                            placeholder="Enter new password"
                          />
                          <button
                            type="button"
                            class="btn-toggle-password"
                            onclick="togglePassword('newPassword')"
                          >
                            <i class="bi bi-eye-fill"></i>
                          </button>
                        </div>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group">
                        <label class="form-label-custom"
                          >Confirm Password</label
                        >
                        <div class="input-group-custom">
                          <span class="input-icon"
                            ><i class="bi bi-lock-fill"></i
                          ></span>
                          <input
                            type="password"
                            class="form-control-custom"
                            id="confirmPassword"
                            placeholder="Confirm new password"
                          />
                          <button
                            type="button"
                            class="btn-toggle-password"
                            onclick="togglePassword('confirmPassword')"
                          >
                            <i class="bi bi-eye-fill"></i>
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="form-actions">
                    <button type="submit" class="btn-save-profile">
                      <i class="bi bi-check-lg"></i>
                      Save Changes
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Success Toast -->
    <div class="toast-container-custom">
      <div id="successToast" class="toast-custom toast-success">
        <i class="bi bi-check-circle-fill"></i>
        <span id="successMessage">Profile updated successfully!</span>
      </div>
      <div id="errorToast" class="toast-custom toast-error">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="errorMessage">Something went wrong!</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin-profile.js"></script>
  </body>
</html>
