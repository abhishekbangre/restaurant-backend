<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome | RestoM Premium</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />

    <link rel="stylesheet " href="css/index.css" />
  </head>
  <body>
    <div class="welcome-screen">
      <div class="welcome-content">
        <img src="assets/logo2.png" alt="RestoM Logo" class="welcome-logo" />

        <span class="welcome-tagline">Authentic Flavors Delivered</span>

        <h1 class="welcome-title">Elevate Your <br />Dining Experience</h1>

        <p class="welcome-description">
          Experience the finest culinary delights from our kitchen to your
          table. Fresh, fast, and crafted with premium ingredients.
        </p>

        <button class="btn-welcome" id="startBtn">
          Ready to Order <i class="bi bi-arrow-right-circle-fill"></i>
        </button>
      </div>
    </div>

    <div id="authModalContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script src="js/welcome.js"></script>

    <script src="js/index.js"></script>
  </body>
</html>
